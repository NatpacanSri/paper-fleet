services:
  - type: web
    name: paper-fleet
    runtime: node
    plan: free
    buildCommand: |
      npm install -g corepack@latest
      corepack enable
      pnpm install --frozen-lockfile
      pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
